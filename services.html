<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrollment | Learning Beyond Barriers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #fcebeb; font-family: 'Poppins', sans-serif; }
.navbar { background-color: #7c90b1; }
.navbar-brand, .nav-link { color: white !important; }

.header-section {
padding: 50px 0;
text-align: center;
}

.header-section h1 {
font-family: 'Playfair Display';
color: #7c90b1;
font-size: 2.5rem;
}

.form-container {
background-color: white;
border-radius: 20px;
padding: 40px;
box-shadow: 0 10px 30px rgba(0,0,0,0.05);
margin-bottom: 60px;
}

.btn-submit {
background-color: #7c90b1;
border: none;
padding: 10px 25px;
color: white;
border-radius: 8px;
}

.btn-submit:hover {
background-color: #65799b;
}

.footer {
background-color: #7c90b1;
color: white;
padding: 40px 0;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand" href="index.html">Learning Beyond Barriers</a>

<div class="navbar-nav ms-auto">
<a class="nav-link" href="index.html">Home</a>
<a class="nav-link" href="about.html">About Us</a>
<a class="nav-link active" href="services.html">Enrollment</a>
<a class="nav-link" href="providers.html">Providers</a>
</div>
</div>
</nav>

<header class="header-section">
<div class="container">
<h1>Enrollment Form</h1>
<p>Fill out the form below to enroll in one of our subjects.</p>
</div>
</header>

<main class="container">

<div class="form-container">

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Select Subject</label>
<select name="subject" class="form-control" required>
<option value="">Choose a subject</option>
<option>Modern Math</option>
<option>Language</option>
<option>Science</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Preferred Schedule</label>
<select name="schedule" class="form-control">
<option>Mon & Wed</option>
<option>Tue & Thu</option>
<option>Fri & Sat</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Message / Notes</label>
<textarea name="message" class="form-control" rows="4"></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn-submit">Submit Enrollment</button>
</div>

</form>

</div>

</main>

</body>
</html>
