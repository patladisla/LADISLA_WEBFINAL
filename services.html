<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Learning Beyond Barriers</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcebeb; font-family: 'Poppins', sans-serif; }
        .navbar { background-color: #7c90b1; }
        .navbar-brand, .nav-link { color: white !important; }
        .header-section { padding: 50px 0; text-align: center; }
        .header-section h1 { font-family: 'Playfair Display'; color: #7c90b1; font-size: 2.5rem; }
        .service-container { background-color: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 50px; }
        .table thead { background-color: #7c90b1; color: white; }
        .table thead th { border: none; padding: 20px; }
        .subject-link { text-decoration: none; display: inline-block; transition: 0.3s ease; }
        .subject-thumbnail { width: 140px; height: 90px; object-fit: cover; border-radius: 12px; border: 3px solid transparent; transition: 0.3s ease; }
        .subject-link:hover .subject-thumbnail { transform: scale(1.08); border-color: #7c90b1; }
        .subject-label { display: block; font-size: 0.85rem; color: #7c90b1; margin-top: 8px; font-weight: 600; }
        .footer { background-color: #7c90b1; color: white; padding: 40px 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Learning Beyond Barriers</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="about.html">About Us</a>
                <a class="nav-link active" href="services.html">Services</a>
                <a class="nav-link" href="providers.html">Providers</a>
            </div>
        </div>
    </nav>

    <header class="header-section">
        <div class="container">
            <h1>Our Educational Services</h1>
            <p>Select a subject to go directly to enrollment.</p>
        </div>
    </header>

    <main class="container">
        <div class="service-container">
            <table class="table table-hover text-center align-middle">
                <thead>
                    <tr><th>Subjects</th><th>Tutors</th><th>Schedules</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <a href="enroll.html?subject=Math" class="subject-link">
                                <img src="math.jpg" alt="Modern Math" class="subject-thumbnail">
                                <span class="subject-label">Modern Math</span>
                            </a>
                        </td>
                        <td>Volunteers</td>
                        <td>Mon & Wed</td>
                    </tr>
                    <tr>
                        <td>
                            <a href="enroll.html?subject=Language" class="subject-link">
                                <img src="english.jpg" alt="Language" class="subject-thumbnail">
                                <span class="subject-label">Language</span>
                            </a>
                        </td>
                        <td>Volunteers</td>
                        <td>Tue & Thu</td>
                    </tr>
                    <tr>
                        <td>
                            <a href="enroll.html?subject=Science" class="subject-link">
                                <img src="sci.jpg" alt="Science" class="subject-thumbnail">
                                <span class="subject-label">Science</span>
                            </a>
                        </td>
                        <td>Volunteers</td>
                        <td>Fri & Sat</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
