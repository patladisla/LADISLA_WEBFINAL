<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment | Learning Beyond Barriers</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcebeb; font-family: 'Poppins', sans-serif; }
        .navbar { background-color: #7c90b1; }
        .navbar-brand, .nav-link { color: white !important; }
        .header-section { padding: 50px 0; text-align: center; }
        .header-section h1 { font-family: 'Playfair Display'; color: #7c90b1; font-size: 2.5rem; }
        
        .enroll-container {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto 50px auto;
        }
        
        .btn-custom { background-color: #7c90b1; color: white; border: none; padding: 10px 25px; border-radius: 8px; }
        .btn-custom:hover { background-color: #657a99; color: white; }
        .footer { background-color: #7c90b1; color: white; padding: 40px 0; margin-top: auto; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Learning Beyond Barriers</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="about.html">About Us</a>
                <a class="nav-link" href="services.html">Services</a>
                <a class="nav-link" href="providers.html">Providers</a>
            </div>
        </div>
    </nav>

    <header class="header-section">
        <div class="container">
            <h1 id="enrollment-title">Enrollment Form</h1>
            <p>Please fill out the details below to complete your registration.</p>
        </div>
    </header>

    <main class="container">
        <div class="enroll-container">
            <form action="https://formspree.io/f/mvzwobnd" method="POST">
                <input type="hidden" name="Subject" id="hidden-subject-input">
                
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Additional Comments</label>
                    <textarea name="message" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-custom w-100">Submit Enrollment</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">Learning Beyond Barriers &copy; 2026</p>
        </div>
    </footer>

    <script>
        
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject');
        
        if (subject) {
            document.getElementById('enrollment-title').innerText = "Enroll for: " + subject;
            document.getElementById('hidden-subject-input').value = subject;
        }
    </script>
</body>
</html>
